name: WireGuard

schemes:
  WireGuardiOS:
    build:
      targets:
        WireGuardiOS: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug

  WireGuardmacOS:
    build:
      targets:
        WireGuardmacOS: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "15.0"
    macOS: "12.0"
  developmentLanguage: en
  knownRegions:
    - Base
    - en
    - zh-Hant
    - zh-Hans
    - id
    - it
    - de
    - fr
    - fi
    - fa
    - sl
    - pl
    - pa
    - ko
    - ca
    - ru
    - ro
    - tr
    - ja
    - es

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Sources/WireGuardApp/Config/Config.xcconfig
  Release: Sources/WireGuardApp/Config/Config.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_PRECOMPILE_BRIDGING_HEADER: NO
    SWIFT_OBJC_BRIDGING_HEADER: Sources/WireGuardApp/WireGuard-Bridging-Header.h
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: -O

targets:

  # ─── Go bridge legacy targets ─────────────────────────────────────────

  WireGuardGoBridgeiOS:
    type: ""
    platform: iOS
    legacy:
      toolPath: /usr/bin/make
      arguments: $(ACTION)
      workingDirectory: Sources/WireGuardKitGo
      passSettings: true
    settings:
      PRODUCT_NAME: WireGuardGoBridge

  WireGuardGoBridgemacOS:
    type: ""
    platform: macOS
    legacy:
      toolPath: /usr/bin/make
      arguments: $(ACTION)
      workingDirectory: Sources/WireGuardKitGo
      passSettings: true
    settings:
      PRODUCT_NAME: WireGuardGoBridge

  # ─── Network Extension targets ────────────────────────────────────────

  WireGuardNetworkExtensioniOS:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/WireGuardKit
      - path: Sources/WireGuardKitC
        excludes:
          - module.modulemap
      - path: Sources/WireGuardNetworkExtension
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Sources/Shared
        excludes:
          - Logging/test_ringlogger.c
          - NotificationToken.swift
          - VPNStatusData.swift
    dependencies:
      - target: WireGuardGoBridgeiOS
        link: false
      - sdk: NetworkExtension.framework
    settings:
      base:
        PRODUCT_NAME: WireGuardNetworkExtension
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_ID_IOS).network-extension
        INFOPLIST_FILE: Sources/WireGuardNetworkExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/WireGuardNetworkExtension/WireGuardNetworkExtension_iOS.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Sources/WireGuardNetworkExtension/WireGuardNetworkExtension-Bridging-Header.h
        CODE_SIGN_IDENTITY: iPhone Developer
        SKIP_INSTALL: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO
        ENABLE_BITCODE: NO
        OTHER_LDFLAGS:
          - $(inherited)
          - -lwg-go
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(BUILT_PRODUCTS_DIR)
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Sources/Shared/Logging
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          export PATH=${PATH}:/usr/local/bin:/opt/homebrew/bin
          if which swiftlint >/dev/null; then
              swiftlint
          else
              echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi

  WireGuardNetworkExtensionmacOS:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/WireGuardKit
      - path: Sources/WireGuardKitC
        excludes:
          - module.modulemap
      - path: Sources/WireGuardNetworkExtension
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: Sources/Shared
        excludes:
          - Logging/test_ringlogger.c
          - NotificationToken.swift
          - VPNStatusData.swift
          - NotificationSettings.swift
    dependencies:
      - target: WireGuardGoBridgemacOS
        link: false
      - sdk: NetworkExtension.framework
    settings:
      base:
        PRODUCT_NAME: WireGuardNetworkExtension
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_ID_MACOS).network-extension
        INFOPLIST_FILE: Sources/WireGuardNetworkExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/WireGuardNetworkExtension/WireGuardNetworkExtension_macOS.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Sources/WireGuardNetworkExtension/WireGuardNetworkExtension-Bridging-Header.h
        CODE_SIGN_IDENTITY: Mac Developer
        SKIP_INSTALL: YES
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: NO
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_LDFLAGS:
          - $(inherited)
          - -lwg-go
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(BUILT_PRODUCTS_DIR)
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(PROJECT_DIR)/Sources/Shared/Logging
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          export PATH=${PATH}:/usr/local/bin:/opt/homebrew/bin
          if which swiftlint >/dev/null; then
              swiftlint
          else
              echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi

  # ─── iOS app ──────────────────────────────────────────────────────────

  WireGuardiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/WireGuardKit
        excludes:
          - WireGuardAdapter.swift
          - DNSResolver.swift
          - PacketTunnelSettingsGenerator.swift
          - "IPAddress+AddrInfo.swift"
          - "Array+ConcurrentMap.swift"
      - path: Sources/WireGuardKitC
        excludes:
          - module.modulemap
      - path: Sources/Shared
        excludes:
          - Logging/test_ringlogger.c
      - path: Sources/WireGuardApp
        includes:
          - LocalizationHelper.swift
          - WireGuardAppError.swift
          - WireGuardResult.swift
          - "*.lproj/**"
      - path: Sources/WireGuardApp/Tunnel
      - path: Sources/WireGuardApp/ZipArchive
      - path: Sources/WireGuardApp/UI
        excludes:
          - "macOS/**"
          - "iOS/Info.plist"
          - "iOS/*.entitlements"
      - path: Sources/WireGuardApp/Resources/DocumentIcons
    dependencies:
      - target: WireGuardGoBridgeiOS
        link: false
      - target: WireGuardNetworkExtensioniOS
        embed: true
        codeSign: true
      - target: WireGuardWidget
        embed: true
        codeSign: true
      - sdk: NetworkExtension.framework
    settings:
      base:
        PRODUCT_NAME: WGnext
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_ID_IOS)
        INFOPLIST_FILE: Sources/WireGuardApp/UI/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/WireGuardApp/UI/iOS/WireGuard.entitlements
        CODE_SIGN_IDENTITY: iPhone Developer
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(CONFIGURATION_BUILD_DIR)
          - $(PROJECT_DIR)/Sources/Shared/Logging
          - $(PROJECT_DIR)/Sources/WireGuardApp/ZipArchive/3rdparty/minizip
          - $(PROJECT_DIR)/Sources/WireGuardApp/UI/macOS/View
    preBuildScripts:
      - name: Strip Trailing Whitespace
        basedOnDependencyAnalysis: false
        script: |
          find . -name '*.swift' -exec sed -i'' -E 's/[[:space:]]+$//g' {} +
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          export PATH=${PATH}:/usr/local/bin:/opt/homebrew/bin
          if which swiftlint >/dev/null; then
              swiftlint
          else
              echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
      - name: Extract wireguard-go Version
        basedOnDependencyAnalysis: false
        script: |
          exec make -C "$PROJECT_DIR/Sources/WireGuardKitGo" version-header

  # ─── iOS widget extension (NEW) ──────────────────────────────────────

  WireGuardWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/WireGuardWidget/WireGuardWidget.swift
      - path: Sources/Shared/VPNStatusData.swift
      - path: Sources/Shared/VPNTrafficData.swift
      - path: Sources/Shared/IPDiscoverySettings.swift
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_NAME: WireGuardWidget
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_ID_IOS).widget
        INFOPLIST_FILE: Sources/WireGuardWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/WireGuardWidget/WireGuardWidget.entitlements
        CODE_SIGN_IDENTITY: iPhone Developer
        SKIP_INSTALL: YES
        SWIFT_OBJC_BRIDGING_HEADER: ""

  # ─── macOS login item helper ──────────────────────────────────────────

  WireGuardmacOSLoginItemHelper:
    type: application
    platform: macOS
    sources:
      - path: Sources/WireGuardApp/UI/macOS/LoginItemHelper/main.m
    settings:
      base:
        PRODUCT_NAME: WireGuardLoginItemHelper
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_ID_MACOS).login-item-helper
        INFOPLIST_FILE: Sources/WireGuardApp/UI/macOS/LoginItemHelper/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/WireGuardApp/UI/macOS/LoginItemHelper/LoginItemHelper.entitlements
        CODE_SIGN_IDENTITY: Mac Developer
        SKIP_INSTALL: YES
        SWIFT_OBJC_BRIDGING_HEADER: ""

  # ─── macOS app ────────────────────────────────────────────────────────

  WireGuardmacOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/WireGuardKit
        excludes:
          - WireGuardAdapter.swift
          - DNSResolver.swift
          - PacketTunnelSettingsGenerator.swift
          - "IPAddress+AddrInfo.swift"
          - "Array+ConcurrentMap.swift"
      - path: Sources/WireGuardKitC
        excludes:
          - module.modulemap
      - path: Sources/Shared
        excludes:
          - Logging/test_ringlogger.c
          - NotificationSettings.swift
          - VPNStatusData.swift
      - path: Sources/WireGuardApp
        includes:
          - LocalizationHelper.swift
          - WireGuardAppError.swift
          - WireGuardResult.swift
          - "*.lproj/**"
      - path: Sources/WireGuardApp/Tunnel
      - path: Sources/WireGuardApp/ZipArchive
      - path: Sources/WireGuardApp/UI
        excludes:
          - "iOS/**"
          - "macOS/Info.plist"
          - "macOS/*.entitlements"
          - "macOS/LoginItemHelper/**"
    dependencies:
      - target: WireGuardGoBridgemacOS
        link: false
      - target: WireGuardNetworkExtensionmacOS
        embed: true
        codeSign: true
      - target: WireGuardmacOSLoginItemHelper
        link: false
      - sdk: NetworkExtension.framework
    settings:
      base:
        PRODUCT_NAME: WGnext
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_ID_MACOS)
        INFOPLIST_FILE: Sources/WireGuardApp/UI/macOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/WireGuardApp/UI/macOS/WireGuard.entitlements
        CODE_SIGN_IDENTITY: Mac Developer
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        HEADER_SEARCH_PATHS:
          - $(inherited)
          - $(CONFIGURATION_BUILD_DIR)
          - $(PROJECT_DIR)/Sources/Shared/Logging
          - $(PROJECT_DIR)/Sources/WireGuardApp/ZipArchive/3rdparty/minizip
          - $(PROJECT_DIR)/Sources/WireGuardApp/UI/macOS/View
    preBuildScripts:
      - name: Strip Trailing Whitespace
        basedOnDependencyAnalysis: false
        script: |
          find . -name '*.swift' -exec sed -i'' -E 's/[[:space:]]+$//g' {} +
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          export PATH=${PATH}:/usr/local/bin:/opt/homebrew/bin
          if which swiftlint >/dev/null; then
              swiftlint
          else
              echo "warning: SwiftLint not installed, download from https://github.com/realm/SwiftLint"
          fi
      - name: Extract wireguard-go Version
        basedOnDependencyAnalysis: false
        script: |
          exec make -C "$PROJECT_DIR/Sources/WireGuardKitGo" version-header
    postBuildScripts:
      - name: Embed Login Item Helper
        script: |
          mkdir -p "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Library/LoginItems"
          ditto "${BUILT_PRODUCTS_DIR}/WireGuardLoginItemHelper.app" "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Library/LoginItems/WireGuardLoginItemHelper.app"
        basedOnDependencyAnalysis: false
